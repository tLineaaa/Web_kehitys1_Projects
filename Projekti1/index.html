<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO -lista</title>
    <link rel="stylesheet" href="css/css.css">
</head>
<body>
    <h1>TO DO</h1>
    <div class ="container">
    <h5>Hyvin suunniteltu <br> on puoliksi tehty, joten <br> siitä vaan listaamaan:</h5>
    <form id="listaan"> 
        <textarea id="mainTehtava" placeholder="Kirjoita tähän" rows="2"></textarea><br>
<!--   <input type="text" id="tehtava"> -->
    <input onclick="lisaaListaan()" id="tallennaNappi" type="button" value="Tallenna" />
    </form>
    <br>
    </div>
    <br>
<!-- Listausnäkymä-->
    <div class="container2">
     <table id="lista" class="display">
        <thead>
        <tr>
            <br>
            <td></td>
            <th>Tehtävät</th>
        </tr>
    </thead>
    </table>
    <br>
    <form id="lisaysListaan"> 
        <textarea id="lisays" placeholder="lisää tehtäväosio" rows="1"></textarea><br>
    <input onclick="lisaaListaan()" id="lisaaNappi" type="button" value="Lisää" />
    <button id="poistaNappi" type="button" abled>Poista</button> <!-- varmistus -->
    </form> 
    <br>
    <br>
    </div>
    <script src="js/javascript.js"></script>
</body>
</html>
