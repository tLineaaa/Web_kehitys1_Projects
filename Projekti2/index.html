<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO -lista</title>
    <link rel="stylesheet" href="css/css.css">
</head>
<body>
    <h1>TO DO</h1>
    <div class ="container">
    <h5>Hyvin suunniteltu <br> on puoliksi tehty, joten <br> siitä vaan listaamaan:</h5>
    <form id="listaan"> 
        <textarea id="mainTehtava" placeholder="Kirjoita tähän" rows="2"></textarea><br>
    <button id="uusiNappi" type="submit" abled>Luo uusi lista</button>
    </form>
    <br>
    <div class="container2">
        <div class="listanpaikka"></div>
    <form id="lisaysListaan"> 
        <textarea id="lisays" placeholder="lisää tehtäväosio" rows="1"></textarea><br>
    <input onclick="lisaaListaan()" id="lisaaNappi" type="button" value="Lisää" />
    <button id="poistaNappi" type="button" abled>Poista lista</button>
    <button id="tallennaLista" type="button" abled>Tallenna lista</button>
    </form> 
    </div>
    <br>
    </div>
    <br>
    <br>
<!-- Listausnäkymä-->
    <div class="container3">
    <br>
    <h4>Listat</h4>

    <br>
    </div>
